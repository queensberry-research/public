[pytest]
  addopts = [
    "-ra",
    "-vv",
    "--color=auto",
    "--durations=10",
    "--durations-min=10",
  ]
  asyncio_default_fixture_loop_scope = "function"
  asyncio_mode = "auto"
  collect_imported_tests = false
  empty_parameter_set_mark = "fail_at_collect"
  filterwarnings = [
    "error",
    "ignore::DeprecationWarning",
    "ignore::ResourceWarning",
    "ignore::RuntimeWarning",
  ]
  minversion = "9.0"
  strict = true
  testpaths = ["src/tests"]
  timeout = "300"
  xfail_strict = true
