services:
  tailscale:
    cap_add:
      - net_admin
    environment:
      - TS_AUTHKEY=file:/run/secrets/auth_key.txt
      - TS_EXTRA_ARGS=--accept-routes=true --accept-dns=true --force-reauth --login-server=${TS_LOGIN_SERVER:?} --reset
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
    hostname: ${HOSTNAME:?}
    image: tailscale/tailscale:latest
    restart: unless-stopped
    secrets:
      - auth_key.txt
    volumes:
      - tailscale-state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun

secrets:
  auth_key.txt:
    file: ${TS_SECRETS_DIR:?}/${HOSTNAME:?}/qrt-staging.txt

volumes:
  tailscale-state:
